gps_node:
  ros__parameters:
    protocol: ubx
    serial_port: /dev/ttyAMA5
    baudrate: 230400
    frame_id: gps_link
    fix_topic: /sura/sensors/gps/fix

gps_anchor_node:
  ros__parameters:
    gps_topic: /sura/sensors/gps/fix
    yaw_topic: /sura/sensors/gps/yaw_init

    world_frame: world_enu
    fastlio_map_frame: map
    position_frame: gps_frame
    base_frame: blueboat/base_link_enu

    origin_mode: manual
    origin_latitude: 39.994335199497364
    origin_longitude: -0.07400607762331379
    origin_altitude: 0.0

    anchor_sample_count: 10
    max_horizontal_accuracy_m: 20.0

    # Fixed yaw of world_frame relative to geographic ENU.
    # 0.0 rad means world_frame x points East.
    world_frame_yaw_rad: 0.0
    # If true, ignore yaw_topic and use this robot yaw wrt East for the initial anchor.
    use_manual_base_yaw: false
    manual_base_yaw_east_rad: 0.0
    # Additional calibration offset for the yaw source.
    yaw_offset_rad: 0.0

    publish_path: true
    max_path_size: 1000
